name: Auto Security Report Engine

on:
  issues:
    types: [opened]

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Prepare folders
        run: mkdir -p reports

      - name: Generate safe filename
        id: file
        run: |
          TITLE="${{ github.event.issue.title }}"
          SAFE=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd 'a-z0-9-_')
          echo "file=reports/${SAFE}.md" >> $GITHUB_OUTPUT

      - name: Detect CWE & Severity
        id: meta
        run: |
          BODY="${{ github.event.issue.body }}"

          CWE="CWE-610"
          SEVERITY="Medium"

          echo "cwe=$CWE" >> $GITHUB_OUTPUT
          echo "severity=$SEVERITY" >> $GITHUB_OUTPUT

      - name: Generate full report
        run: |
          cat <<EOF > ${{ steps.file.outputs.file }}
# ${{ github.event.issue.title }}

---

## Target
${{ github.event.issue.body }}

---

## CWE Classification
${{ steps.meta.outputs.cwe }}

## Severity
${{ steps.meta.outputs.severity }}

---

## Description
${{ github.event.issue.body }}

---

## Impact
See issue discussion

---

## Reproduction Steps
See issue form

---

## Metadata
- Author: ${{ github.event.issue.user.login }}
- Source: ${{ github.event.issue.html_url }}

---

## Status
Reported (Auto-generated system)

---

## Notes
This report was automatically generated from GitHub Issue intake system.
EOF

      - name: Update tracker
        run: |
          echo "- [ ] ${{ github.event.issue.title }} | CWE: ${{ steps.meta.outputs.cwe }} | ${{ github.event.issue.html_url }}" >> report-status.md

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add reports report-status.md
          git commit -m "Auto security report generated"
          git push
